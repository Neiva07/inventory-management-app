name: Build/release

on: push

jobs:
  build:
    strategy:
      matrix:
        os:
          [
            { name: 'linux', image: 'ubuntu-latest' },
            { name: 'windows', image: 'windows-latest' },
            { name: 'macos', image: 'macos-latest' },
          ]

    runs-on: ${{ matrix.os.image }}

    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Github checkout
        uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile

      - name: Prepare Squirrel vendor binaries (7z.exe)
        if: matrix.os.name == 'windows'
        run: |
          Copy-Item "node_modules/electron-winstaller/vendor/7z-x64.exe" "node_modules/electron-winstaller/vendor/7z.exe"
          Copy-Item "node_modules/electron-winstaller/vendor/7z-x64.dll" "node_modules/electron-winstaller/vendor/7z.dll"
        shell: powershell

      - name: Publish app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLERK_API_SECRET_KEY: ${{ secrets.CLERK_API_SECRET_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
        run: pnpm run publish
        timeout-minutes: 15
